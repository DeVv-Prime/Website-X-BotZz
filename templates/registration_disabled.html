<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Closed | Vectro Cloud</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --dark: #0f172a; --darker: #020617; }
        body { background: linear-gradient(135deg, var(--darker) 0%, var(--dark) 100%); color: #f8fafc; min-height: 100vh; display: flex; align-items: center; font-family: 'Inter', sans-serif; }
        .container-custom { max-width: 500px; margin: 0 auto; text-align: center; padding: 2rem; background: rgba(30, 41, 59, 0.7); border-radius: 24px; backdrop-filter: blur(10px); }
        .btn-primary { background: linear-gradient(135deg, var(--primary), #8b5cf6); border: none; padding: 0.75rem 2rem; border-radius: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="container-custom">
            <i class="fas fa-user-plus" style="font-size: 4rem; color: var(--primary); margin-bottom: 1.5rem;"></i>
            <h2 class="mb-4">Registration Temporarily Closed</h2>
            <p class="text-muted mb-4">We're not accepting new registrations at this time. Please check back later or contact support for more information.</p>
            <a href="/" class="btn btn-primary"><i class="fas fa-home"></i> Back to Home</a>
        </div>
    </div>
</body>
</html>
