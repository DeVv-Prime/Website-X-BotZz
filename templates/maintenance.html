<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance | {{ site_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #6366f1; --dark: #0f172a; --darker: #020617; }
        body { background: linear-gradient(135deg, var(--darker) 0%, var(--dark) 100%); color: #f8fafc; min-height: 100vh; display: flex; align-items: center; font-family: 'Inter', sans-serif; }
        .maintenance-container { text-align: center; padding: 3rem; }
        .maintenance-icon { font-size: 5rem; color: var(--primary); margin-bottom: 2rem; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        h1 { font-size: 3rem; font-weight: 700; margin-bottom: 1rem; background: linear-gradient(135deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>
    <div class="container">
        <div class="maintenance-container">
            <div class="maintenance-icon"><i class="fas fa-tools"></i></div>
            <h1>{{ site_name }}</h1>
            <h2 class="mb-4">Under Maintenance</h2>
            <p class="lead mb-4 text-muted">We're currently performing scheduled maintenance.<br>We'll be back online shortly. Thank you for your patience!</p>
            <div class="text-muted"><i class="far fa-clock"></i> Estimated time: 1 hour</div>
        </div>
    </div>
</body>
</html>
