<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Vectro Cloud</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #6366f1; --dark: #0f172a; --darker: #020617; }
        body { background: linear-gradient(135deg, var(--darker) 0%, var(--dark) 100%); color: #f8fafc; min-height: 100vh; display: flex; align-items: center; font-family: 'Inter', sans-serif; }
        .error-container { text-align: center; padding: 3rem; }
        .error-code { font-size: 8rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), #8b5cf6); border: none; padding: 0.75rem 2rem; border-radius: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-container">
            <div class="error-code">404</div>
            <h1 class="mb-4">Page Not Found</h1>
            <p class="lead mb-4 text-muted">The page you're looking for doesn't exist or has been moved.</p>
            <a href="/" class="btn btn-primary"><i class="fas fa-home"></i> Back to Home</a>
        </div>
    </div>
</body>
</html>
